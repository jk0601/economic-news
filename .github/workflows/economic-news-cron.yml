# 경제 뉴스 브리핑 봇 — 예약 실행(cron) + 수동 실행
#
# 참고:
# - cron 은 항상 UTC 기준입니다. 한국 09:00(KST) = UTC 00:00 → '0 0 * * *'
# - 첫 테스트는 Actions 탭에서 본 워크플로를 선택한 뒤 "Run workflow"가 가장 확실합니다.
# - 예약 실행은 지연이 몇 분 날 수 있습니다(정각에 딱 맞지 않을 수 있음).

name: Economic news bot

on:
  # 수동 실행 (cron 테스트 전에 먼저 사용 권장)
  workflow_dispatch:

  schedule:
    # 매일 UTC 00:00 (= 한국 시간 매일 09:00)
    - cron: "0 0 * * *"

    # --- 테스트 예시 (필요할 때만 주석 해제; 너무 잦은 실행은 API 한도·비용에 유의) ---
    # 매일 UTC 12시에 한 번 더 실행
    # - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing bot
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python main.py
